<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrideClash</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --accent-green: #00e676;
            --accent-blue: #29b6f6;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #2d2d2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #000000; color: var(--text-primary); display: flex; justify-content: center; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 480px; background-color: var(--bg-main);
            min-height: 100vh; display: flex; flex-direction: column;
            border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
        }

        header { padding: 24px 16px 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-end; }
        header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        header .status-pill { color: var(--text-secondary); font-size: 0.75rem; background-color: var(--bg-card); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color); text-transform: uppercase; font-weight: bold; }

        .time-filters { display: flex; padding: 12px 16px; gap: 8px; }
        .filter-btn { flex: 1; background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        .filter-btn.active { background-color: var(--text-primary); color: var(--bg-main); border-color: var(--text-primary); }

        .leaderboard-scroll { flex: 1; overflow-y: auto; padding: 4px 16px 16px 16px; display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 220px); }
        .leaderboard-scroll::-webkit-scrollbar { width: 4px; }
        .leaderboard-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .user-row { display: flex; align-items: center; background-color: var(--bg-card); padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border-color); }
        .user-row.self { border: 1px solid var(--accent-green); background: linear-gradient(145deg, #1e1e1e, #132719); }
        .user-row.podium-1 { border-color: #ffd700; }
        .user-row.podium-2 { border-color: #c0c0c0; }
        .user-row.podium-3 { border-color: #cd7f32; }

        .rank { font-size: 1rem; font-weight: 700; width: 36px; color: var(--text-secondary); }
        .user-row.self .rank { color: var(--accent-green); }
        .user-row.podium-1 .rank { color: #ffd700; }
        .user-row.podium-2 .rank { color: #c0c0c0; }
        .user-row.podium-3 .rank { color: #cd7f32; }
        
        .info { flex: 1; }
        .name { font-weight: 500; font-size: 0.95rem; }
        .steps-container { text-align: right; }
        .step-count { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
        .user-row.self .step-count { color: var(--accent-green); }

        .input-bar { padding: 16px; border-top: 1px solid var(--border-color); background-color: var(--bg-card); display: flex; gap: 8px; }
        .step-input { flex: 1; background-color: #121212; border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; color: white; font-size: 1rem; font-weight: 600; text-align: center; }
        .step-input:focus { border-color: var(--accent-green); outline: none; }
        .submit-btn { background-color: var(--accent-green); color: black; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div><h1>StrideClash</h1></div>
            <div class="status-pill" id="status-indicator">Syncing...</div>
        </header>

        <div class="time-filters">
            <button class="filter-btn active" onclick="switchView('daily')">Daily</button>
            <button class="filter-btn" onclick="switchView('weekly')">Weekly</button>
            <button class="filter-btn" onclick="switchView('monthly')">Monthly</button>
        </div>

        <div class="leaderboard-scroll" id="leaderboard"></div>

        <div class="input-bar">
            <input type="number" id="manual-steps" class="step-input" placeholder="Enter current steps..." inputmode="numeric">
            <button class="submit-btn" onclick="sendStepsUpdate()">Update</button>
        </div>
    </div>

    <script>
        // SINGLE POINT ENTRY: Paste your deployed Web App URL here
        const AS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxj5VsFkbUYmi1u0Mxh-_qj5g8r5X4ETGQnvb2tTwIjWSc6BzAwJfeQXwnoT2LCieThDw/exec';

        let currentView = 'daily';
        let userSteps = { daily: 0, weekly: 0, monthly: 0 };
        let npcList = [];

        // Expanded nomenclature matrices to unlock thousands of clean variations
        const prefixes = ['Swift', 'Hyper', 'Zenith', 'Apex', 'Cyber', 'Urban', 'Wild', 'Shadow', 'Neon', 'Eco', 'Vortex', 'Solar', 'Alpha', 'Quantum', 'Volt', 'Pace', 'Blaze', 'Sonic', 'Aero', 'Titan'];
        const roots = ['Walker', 'Strider', 'Hiker', 'Runner', 'Pacer', 'Tracker', 'Cruiser', 'Rambler', 'Rover', 'Nomad', 'Stepper', 'Chaser', 'Bounder', 'Trekker', 'Glider'];
        
        const archetypes = [
            { type: 'Chill', baseDaily: 5500, start: 9, end: 21 },
            { type: 'Steady', baseDaily: 9000, start: 8, end: 20 },
            { type: 'Active', baseDaily: 13000, start: 6, end: 19 },
            { type: 'Elite', baseDaily: 18500, start: 5, end: 22 }
        ];

        // Seeded random number generator based on the calendar day
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function generateNPCs(count) {
            const pool = [];
            const allCombinations = [];
            
            // 1. Compile every possible prefix + root username pair combo
            for (let p of prefixes) {
                for (let r of roots) {
                    allCombinations.push(p + r);
                }
            }

            // 2. Use our daily calendar seed to uniformly mix the user deck via Fisher-Yates
            let currentSeed = new Date().getDate() + new Date().getMonth() * 31;
            
            for (let i = allCombinations.length - 1; i > 0; i--) {
                const rIndex = Math.floor(seededRandom(currentSeed++) * (i + 1));
                const temp = allCombinations[i];
                allCombinations[i] = allCombinations[rIndex];
                allCombinations[rIndex] = temp;
            }

            // 3. Take the top unique handles and build the specific competitor behaviors
            for (let i = 0; i < count; i++) {
                const uniqueName = `${allCombinations[i]}${Math.floor(10 + seededRandom(currentSeed++) * 89)}`;
                const profileRand = seededRandom(currentSeed++);

                let arch = archetypes[1]; // default steady
                if (profileRand < 0.15) arch = archetypes[0];
                else if (profileRand > 0.85) arch = archetypes[3];
                else if (profileRand > 0.55) arch = archetypes[2];

                pool.push({
                    username: uniqueName,
                    baseDaily: arch.baseDaily,
                    startHour: arch.start,
                    endHour: arch.end,
                    dailySeed: 0.70 + (seededRandom(currentSeed++) * 0.70),
                    weeklySeed: 0.85 + (seededRandom(currentSeed++) * 0.30),
                    monthlySeed: 0.92 + (seededRandom(currentSeed++) * 0.16)
                });
            }
            return pool;
        }

        function calculateSteps(npc, view) {
            const currentHour = new Date().getHours();
            let dayTarget = npc.baseDaily * npc.dailySeed;
            let dayProgress = currentHour >= npc.endHour ? 1 : (currentHour >= npc.startHour ? (currentHour - npc.startHour) / (npc.endHour - npc.startHour) : 0);

            if (view === 'daily') return Math.floor(dayTarget * dayProgress);
            if (view === 'weekly') return Math.floor((npc.baseDaily * 6 * npc.weeklySeed) + (dayTarget * dayProgress));
            if (view === 'monthly') return Math.floor((npc.baseDaily * 29 * npc.monthlySeed) + (dayTarget * dayProgress));
            return 0;
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';
            // USER CONTEXT NAME SET TO GABE
            let scoreboard = [{ name: 'You (Gabe)', steps: userSteps[currentView], isSelf: true }];

            npcList.forEach(npc => { scoreboard.push({ name: npc.username, steps: calculateSteps(npc, currentView), isSelf: false }); });
            scoreboard.sort((a, b) => b.steps - a.steps);

            scoreboard.forEach((player, index) => {
                const rankNum = index + 1;
                let podiumClass = !player.isSelf && rankNum <= 3 ? `podium-${rankNum}` : '';
                const row = document.createElement('div');
                row.className = `user-row ${player.isSelf ? 'self' : ''} ${podiumClass}`;
                row.innerHTML = `<div class="rank">#${rankNum}</div><div class="info"><div class="name">${player.name}</div></div><div class="steps-container"><div class="step-count">${player.steps.toLocaleString()}</div></div>`;
                container.appendChild(row);
            });
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('active'); if(btn.innerText.toLowerCase() === view) btn.classList.add('active'); });
            renderLeaderboard();
        }

        function fetchLiveSteps() {
            const indicator = document.getElementById('status-indicator');
            if (AS_WEB_APP_URL === 'https://script.google.com/macros/s/AKfycbxj5VsFkbUYmi1u0Mxh-_qj5g8r5X4ETGQnvb2tTwIjWSc6BzAwJfeQXwnoT2LCieThDw/exec') {
                indicator.innerText = "Demo Mode";
                const savedDaily = localStorage.getItem('demo_steps_daily') || 0;
                userSteps = { daily: parseInt(savedDaily), weekly: 28000 + parseInt(savedDaily), monthly: 112000 + parseInt(savedDaily) };
                renderLeaderboard();
                return;
            }
            fetch(AS_WEB_APP_URL).then(res => res.json()).then(data => {
                userSteps.daily = data.daily; userSteps.weekly = data.weekly; userSteps.monthly = data.monthly;
                indicator.innerText = "Live"; renderLeaderboard();
            }).catch(() => { indicator.innerText = "Offline"; });
        }

        function sendStepsUpdate() {
            const inputField = document.getElementById('manual-steps');
            const stepsValue = parseInt(inputField.value);
            if (isNaN(stepsValue) || stepsValue < 0) return alert('Enter a valid step number.');

            const indicator = document.getElementById('status-indicator');
            indicator.innerText = "Saving...";

            if (AS_WEB_APP_URL === 'https://script.google.com/macros/s/AKfycbxj5VsFkbUYmi1u0Mxh-_qj5g8r5X4ETGQnvb2tTwIjWSc6BzAwJfeQXwnoT2LCieThDw/exec') {
                userSteps.daily = stepsValue;
                localStorage.setItem('demo_steps_daily', stepsValue);
                indicator.innerText = "Demo Saved";
                inputField.value = '';
                fetchLiveSteps();
                return;
            }

            fetch(`${AS_WEB_APP_URL}?updateSteps=${stepsValue}`)
                .then(res => res.json())
                .then(() => { inputField.value = ''; fetchLiveSteps(); })
                .catch(() => { alert('Failed to connect to DB.'); fetchLiveSteps(); });
        }

        npcList = generateNPCs(49);
        fetchLiveSteps();
        setInterval(renderLeaderboard, 60000);

        // PWA Configuration linkages
        const manifestLink = document.createElement('link'); manifestLink.rel = 'manifest'; manifestLink.href = 'manifest.json'; document.head.appendChild(manifestLink);
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js'); }); }
    </script>
</body>
</html>
