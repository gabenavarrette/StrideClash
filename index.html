<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrideClash</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --accent-green: #00e676;
            --accent-blue: #29b6f6;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        header {
            padding: 24px 16px 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header .status-pill {
            color: var(--text-secondary);
            font-size: 0.75rem;
            background-color: var(--bg-card);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-transform: uppercase;
            font-weight: bold;
        }

        .time-filters {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
        }

        .filter-btn {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--text-primary);
            color: var(--bg-main);
            border-color: var(--text-primary);
        }

        .leaderboard-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: calc(100vh - 140px);
        }

        .leaderboard-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .leaderboard-scroll::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .user-row {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .user-row.self {
            border: 1px solid var(--accent-green);
            background: linear-gradient(145deg, #1e1e1e, #132719);
        }

        .user-row.podium-1 { border-color: #ffd700; }
        .user-row.podium-2 { border-color: #c0c0c0; }
        .user-row.podium-3 { border-color: #cd7f32; }

        .rank {
            font-size: 1rem;
            font-weight: 700;
            width: 36px;
            color: var(--text-secondary);
        }

        .user-row.self .rank { color: var(--accent-green); }
        .user-row.podium-1 .rank { color: #ffd700; }
        .user-row.podium-2 .rank { color: #c0c0c0; }
        .user-row.podium-3 .rank { color: #cd7f32; }

        .info {
            flex: 1;
        }

        .name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .steps-container {
            text-align: right;
        }

        .step-count {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .user-row.self .step-count {
            color: var(--accent-green);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <h1>StrideClash</h1>
            </div>
            <div class="status-pill" id="status-indicator">Syncing...</div>
        </header>

        <div class="time-filters">
            <button class="filter-btn active" onclick="switchView('daily')">Daily</button>
            <button class="filter-btn" onclick="switchView('weekly')">Weekly</button>
            <button class="filter-btn" onclick="switchView('monthly')">Monthly</button>
        </div>

        <div class="leaderboard-scroll" id="leaderboard">
            </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const AS_WEB_APP_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

        let currentView = 'daily';
        let userSteps = { daily: 0, weekly: 0, monthly: 0 };
        let npcList = [];

        const prefixes = ['Swift', 'Hyper', 'Zenith', 'Apex', 'Cyber', 'Urban', 'Wild', 'Shadow', 'Neon', 'Eco', 'Vortex', 'Solar', 'Alpha', 'Quantum'];
        const roots = ['Walker', 'Strider', 'Hiker', 'Runner', 'Pacer', 'Tracker', 'Cruiser', 'Rambler', 'Rover', 'Nomad', 'Stepper'];
        const archetypes = [
            { type: 'Chill', baseDaily: 5500, start: 9, end: 21 },
            { type: 'Steady', baseDaily: 9000, start: 8, end: 20 },
            { type: 'Active', baseDaily: 13000, start: 6, end: 19 },
            { type: 'Elite', baseDaily: 18500, start: 5, end: 22 }
        ];

        function generateNPCs(count) {
            const pool = [];
            // Seed generation based on current calendar date so rivals change targets each morning
            const daySeed = new Date().getDate();
            
            for (let i = 0; i < count; i++) {
                // Pseudo-random calculations using reproducible sine-wave seeding
                const pseudoRand1 = Math.abs(Math.sin(daySeed + i));
                const pseudoRand2 = Math.abs(Math.sin(daySeed * 2 + i));
                const pseudoRand3 = Math.abs(Math.sin(daySeed * 3 + i));

                const pref = prefixes[Math.floor(pseudoRand1 * prefixes.length)];
                const root = roots[Math.floor(pseudoRand2 * roots.length)];
                const username = `${pref}${root}${Math.floor(10 + pseudoRand3 * 89)}`;

                let arch = archetypes[1]; 
                if (pseudoRand1 < 0.15) arch = archetypes[0];
                else if (pseudoRand1 > 0.85) arch = archetypes[3];
                else if (pseudoRand1 > 0.55) arch = archetypes[2];

                pool.push({
                    username: username,
                    baseDaily: arch.baseDaily,
                    startHour: arch.start,
                    endHour: arch.end,
                    dailySeed: 0.70 + (pseudoRand1 * 0.70),
                    weeklySeed: 0.85 + (pseudoRand2 * 0.30),
                    monthlySeed: 0.92 + (pseudoRand3 * 0.16)
                });
            }
            return pool;
        }

        function calculateSteps(npc, view) {
            const currentHour = new Date().getHours();
            let dayTarget = npc.baseDaily * npc.dailySeed;

            let dayProgress = 0;
            if (currentHour >= npc.endHour) {
                dayProgress = 1;
            } else if (currentHour >= npc.startHour) {
                dayProgress = (currentHour - npc.startHour) / (npc.endHour - npc.startHour);
            }

            if (view === 'daily') {
                return Math.floor(dayTarget * dayProgress);
            } else if (view === 'weekly') {
                return Math.floor((npc.baseDaily * 6 * npc.weeklySeed) + (dayTarget * dayProgress));
            } else if (view === 'monthly') {
                return Math.floor((npc.baseDaily * 29 * npc.monthlySeed) + (dayTarget * dayProgress));
            }
            return 0;
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            let scoreboard = [
                { name: 'You (Ali)', steps: userSteps[currentView], isSelf: true }
            ];

            npcList.forEach(npc => {
                scoreboard.push({
                    name: npc.username,
                    steps: calculateSteps(npc, currentView),
                    isSelf: false
                });
            });

            scoreboard.sort((a, b) => b.steps - a.steps);

            scoreboard.forEach((player, index) => {
                const rankNum = index + 1;
                let podiumClass = '';
                
                if (!player.isSelf) {
                    if (rankNum === 1) podiumClass = 'podium-1';
                    if (rankNum === 2) podiumClass = 'podium-2';
                    if (rankNum === 3) podiumClass = 'podium-3';
                }

                const row = document.createElement('div');
                row.className = `user-row ${player.isSelf ? 'self' : ''} ${podiumClass}`;
                row.innerHTML = `
                    <div class="rank">#${rankNum}</div>
                    <div class="info">
                        <div class="name">${player.name}</div>
                    </div>
                    <div class="steps-container">
                        <div class="step-count">${player.steps.toLocaleString()}</div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === view) btn.classList.add('active');
            });
            renderLeaderboard();
        }

        function fetchLiveSteps() {
            const indicator = document.getElementById('status-indicator');
            if (AS_WEB_APP_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
                indicator.innerText = "Demo Mode";
                userSteps = { daily: 6400, weekly: 43200, monthly: 189000 };
                renderLeaderboard();
                return;
            }

            fetch(AS_WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    if(data.error) {
                        indicator.innerText = "Error";
                        console.error(data.error);
                    } else {
                        userSteps.daily = data.daily;
                        userSteps.weekly = data.weekly;
                        userSteps.monthly = data.monthly;
                        indicator.innerText = "Live";
                        renderLeaderboard();
                    }
                })
                .catch(err => {
                    indicator.innerText = "Offline";
                    console.error(err);
                });
        }

        // Initialize App Loop
        npcList = generateNPCs(49);
        fetchLiveSteps();

        // Refresh values smoothly in background
        setInterval(renderLeaderboard, 60000); // Clock tick
        setInterval(fetchLiveSteps, 300000);    // Pull DB every 5 mins

        // Link App Manifest file context
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = 'manifest.json';
document.head.appendChild(manifestLink);

// Register Background Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
    });
}
    </script>
</body>
</html>
